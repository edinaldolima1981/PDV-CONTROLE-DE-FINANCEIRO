<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1">
<title>PDV de Restaurante — Demo Interativa</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍺</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a1628;
    --bg-panel: #111d33;
    --bg-card: #182842;
    --bg-hover: #1e3350;
    --border: #243b5c;
    --border-light: #2d4a70;
    --accent: #3b82f6;
    --accent-glow: rgba(59,130,246,0.3);
    --green: #22c55e;
    --green-dark: #16a34a;
    --red: #ef4444;
    --red-dark: #dc2626;
    --orange: #f59e0b;
    --orange-dark: #d97706;
    --teal: #14b8a6;
    --text: #e8edf5;
    --text-dim: #8899b4;
    --text-muted: #5a6d87;
    --menu-bg: #faf8f4;
    --menu-card: #fff;
    --menu-border: #e5dfd4;
    --menu-text: #2a2520;
    --menu-price: #15803d;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Outfit',sans-serif; background:var(--bg-deep); color:var(--text); overflow:hidden; height:100vh; }
  
  button { font-family:inherit; cursor:pointer; transition:all 0.15s ease; }
  button:active { transform:scale(0.96); }
  input, textarea { font-family:inherit; }

  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--border-light); }

  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes scaleIn { from{opacity:0;transform:scale(0.93)} to{opacity:1;transform:scale(1)} }
  @keyframes slideDown { from{opacity:0;transform:translateX(-50%) translateY(-20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
  @keyframes glow { 0%,100%{box-shadow:0 0 8px var(--accent-glow)} 50%{box-shadow:0 0 20px var(--accent-glow)} }
  @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

  .app { display:flex; flex-direction:column; height:100vh; }

  /* ── HEADER ── */
  .header {
    display:flex; align-items:center; justify-content:space-between;
    padding:0 20px; height:56px; flex-shrink:0;
    background:linear-gradient(135deg, #0f1f38 0%, #162a4a 100%);
    border-bottom:1px solid var(--border);
    box-shadow:0 2px 20px rgba(0,0,0,0.3);
  }
  .logo { display:flex; align-items:center; gap:12px; }
  .logo-icon { font-size:30px; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
  .logo-text { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
  .logo-sub { font-size:13px; font-weight:400; color:var(--text-dim); margin-left:2px; }
  .header-stats { display:flex; gap:16px; font-size:12px; font-weight:500; color:var(--text-dim); }
  .header-stat { display:flex; align-items:center; gap:5px; }
  .header-dot { width:8px; height:8px; border-radius:50%; }
  .header-icons { display:flex; gap:8px; }
  .header-icon {
    width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,0.05); border:1px solid var(--border); font-size:16px; cursor:pointer;
    transition:all 0.2s;
  }
  .header-icon:hover { background:rgba(255,255,255,0.1); border-color:var(--border-light); }

  /* ── MAIN ── */
  .main { display:flex; flex:1; gap:12px; padding:12px; overflow:hidden; }

  /* ── LEFT PANEL: MENU ── */
  .left-panel {
    width:290px; flex-shrink:0; display:flex; flex-direction:column;
    background:var(--bg-panel); border-radius:12px; border:1px solid var(--border);
    overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.2);
  }
  .tabs { display:flex; border-bottom:1px solid var(--border); }
  .tab {
    flex:1; padding:12px 8px; text-align:center; font-size:13px; font-weight:600;
    cursor:pointer; transition:all 0.2s; color:var(--text-muted); background:transparent;
    border:none; border-bottom:2px solid transparent; position:relative;
  }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); background:rgba(59,130,246,0.05); }
  .tab:hover:not(.active) { color:var(--text-dim); background:rgba(255,255,255,0.02); }

  .search-row { display:flex; gap:8px; padding:10px; border-bottom:1px solid var(--border); }
  .search-wrap { position:relative; flex:1; }
  .search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:13px; color:#999; }
  .search-input {
    width:100%; padding:9px 12px 9px 32px; border-radius:8px; border:1px solid var(--menu-border);
    background:var(--menu-bg); font-size:13px; color:var(--menu-text); outline:none;
  }
  .search-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
  .btn-add-item {
    width:36px; height:36px; border-radius:8px; border:none; background:var(--green);
    color:#fff; font-size:20px; font-weight:700; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 8px rgba(34,197,94,0.3);
  }
  .btn-add-item:hover { background:var(--green-dark); }

  .menu-list { flex:1; overflow-y:auto; padding:6px; }
  .menu-item {
    display:flex; align-items:center; gap:10px; padding:8px 10px;
    margin-bottom:5px; border-radius:8px; cursor:pointer;
    background:var(--menu-card); border:1px solid var(--menu-border);
    transition:all 0.15s; color:var(--menu-text);
  }
  .menu-item:hover { transform:translateX(3px); box-shadow:0 2px 12px rgba(0,0,0,0.08); border-color:#ccc; }
  .menu-item-img {
    width:48px; height:48px; border-radius:8px; display:flex; align-items:center;
    justify-content:center; font-size:26px; background:#f8f6f0; border:1px solid #eee; flex-shrink:0;
  }
  .menu-item-info { flex:1; min-width:0; }
  .menu-item-name { font-size:14px; font-weight:600; color:var(--menu-text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .menu-item-price { font-size:13px; font-weight:700; color:var(--menu-price); margin-top:2px; }
  .menu-item-edit {
    width:28px; height:28px; border-radius:50%; border:1px solid #ddd; background:#fff;
    font-size:11px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
    opacity:0; transition:opacity 0.2s;
  }
  .menu-item:hover .menu-item-edit { opacity:1; }
  .menu-count { padding:6px 12px; border-top:1px solid var(--border); font-size:11px; color:var(--text-muted); text-align:center; }

  /* ── CENTER PANEL: PEDIDO ── */
  .center-panel {
    flex:1; display:flex; flex-direction:column;
    background:var(--bg-panel); border-radius:12px; border:1px solid var(--border);
    overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.2);
  }
  .mesa-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 18px; background:linear-gradient(135deg, var(--bg-card) 0%, var(--bg-panel) 100%);
    border-bottom:1px solid var(--border);
  }
  .mesa-title { font-size:17px; font-weight:700; }
  .mesa-garcom { font-size:13px; color:var(--text-dim); margin-left:10px; font-weight:400; }
  .mesa-timer { font-size:11px; color:var(--accent); margin-left:10px; font-weight:500; }

  .status-badge {
    display:flex; align-items:center; gap:10px; padding:10px 18px;
    font-size:12px; font-weight:600; border-bottom:1px solid var(--border);
  }
  .status-badge.livre { background:linear-gradient(135deg, #0a2a18, #0d1f14); }
  .status-badge.ocupada { background:linear-gradient(135deg, #2a0f0f, #1f0d0d); }
  .status-dot {
    width:10px; height:10px; border-radius:50%; animation:pulse 2s infinite;
  }
  .status-dot.green { background:var(--green); box-shadow:0 0 10px var(--green); }
  .status-dot.red { background:var(--red); box-shadow:0 0 10px var(--red); }
  .btn-abrir-inline {
    margin-left:auto; padding:5px 16px; border-radius:20px; border:none;
    background:var(--green); color:#fff; font-weight:700; font-size:12px;
    box-shadow:0 2px 8px rgba(34,197,94,0.3);
  }
  .btn-abrir-inline:hover { background:var(--green-dark); }
  .status-info {
    margin-left:auto; background:rgba(255,255,255,0.07); padding:4px 12px;
    border-radius:20px; font-size:11px; color:var(--text-dim); font-weight:500;
  }

  .order-list { flex:1; overflow-y:auto; padding:10px 16px; }
  .order-empty { text-align:center; color:var(--text-muted); padding:50px 20px; font-size:14px; line-height:1.6; }
  .order-item {
    display:flex; align-items:center; padding:10px 14px; margin-bottom:6px;
    border-radius:8px; cursor:pointer; transition:all 0.15s;
    background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06);
  }
  .order-item:hover { background:rgba(255,255,255,0.06); }
  .order-item.selected { background:rgba(59,130,246,0.12); border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
  .order-item-info { flex:1; }
  .order-item-name { font-size:14px; font-weight:500; }
  .order-item-time { font-size:10px; color:var(--text-muted); margin-top:2px; }
  .order-item-price { font-size:14px; font-weight:700; margin-left:12px; white-space:nowrap; }
  .order-item-controls { display:flex; align-items:center; gap:4px; margin-left:12px; }
  .qty-btn {
    width:28px; height:28px; border-radius:50%; border:none; color:#fff;
    font-weight:700; font-size:14px; display:flex; align-items:center; justify-content:center;
  }
  .qty-btn.minus { background:var(--red); }
  .qty-btn.plus { background:var(--green); }
  .qty-num { width:26px; text-align:center; font-weight:700; font-size:14px; }

  .action-bar {
    display:flex; gap:8px; padding:10px 16px;
    border-top:1px solid var(--border); border-bottom:1px solid var(--border);
  }
  .action-btn {
    flex:1; padding:9px 6px; border-radius:8px; border:none;
    font-size:11px; font-weight:700; color:#fff; text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
  }

  .totals { padding:14px 18px; }
  .total-row { display:flex; justify-content:space-between; padding:3px 0; font-size:14px; color:var(--text-dim); }
  .total-row.grand {
    font-size:24px; font-weight:800; color:var(--red);
    border-top:1px solid var(--border); padding-top:10px; margin-top:6px;
    letter-spacing:-0.5px;
  }

  /* ── RIGHT PANEL: PAGAMENTO ── */
  .right-panel { width:230px; flex-shrink:0; display:flex; flex-direction:column; gap:10px; }
  .pay-section {
    background:var(--bg-panel); border-radius:12px; border:1px solid var(--border);
    padding:14px; box-shadow:0 4px 20px rgba(0,0,0,0.2);
  }
  .pay-title { font-size:13px; font-weight:700; text-align:center; color:var(--text-dim); margin-bottom:10px; text-transform:uppercase; letter-spacing:1px; }
  .pay-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-bottom:8px; }
  .pay-btn {
    padding:10px 4px; border-radius:8px; border:2px solid transparent;
    font-size:11px; font-weight:700; color:#fff; text-align:center;
    transition:all 0.2s;
  }
  .pay-btn:hover { filter:brightness(1.15); }
  .pay-btn.active { border-color:#fff; box-shadow:0 0 15px rgba(255,255,255,0.15); }
  .pay-btn-icon { font-size:18px; display:block; margin-bottom:2px; }
  .pay-btn-wide {
    width:100%; padding:10px; border-radius:8px; border:2px solid transparent;
    font-size:11px; font-weight:700; color:#fff; background:#5a4a2a;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .pay-btn-wide.active { border-color:#fff; }

  .big-btn {
    padding:15px; border-radius:10px; border:none; font-size:15px; font-weight:700;
    color:#fff; text-align:center; box-shadow:0 4px 16px rgba(0,0,0,0.3);
    letter-spacing:0.3px;
  }
  .big-btn:hover { filter:brightness(1.1); transform:translateY(-1px); box-shadow:0 6px 24px rgba(0,0,0,0.4); }

  .comprovante-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .comprovante-btn {
    padding:14px 8px; border-radius:8px; border:1px solid var(--border);
    background:var(--bg-card); color:#fff; font-size:11px; font-weight:600;
    display:flex; flex-direction:column; align-items:center; gap:6px; text-align:center;
  }
  .comprovante-btn:hover { background:var(--bg-hover); border-color:var(--border-light); }
  .comprovante-icon { font-size:22px; }

  /* ── FOOTER ── */
  .footer {
    display:flex; align-items:center; justify-content:space-between;
    padding:0 16px; height:48px; flex-shrink:0;
    background:linear-gradient(135deg, #0f1f38, #162a4a);
    border-top:1px solid var(--border);
  }
  .footer-group { display:flex; gap:8px; }
  .footer-btn {
    display:flex; align-items:center; gap:6px; padding:7px 14px; border-radius:8px;
    border:1px solid var(--border); background:rgba(255,255,255,0.04); color:var(--text);
    font-size:12px; font-weight:600;
  }
  .footer-btn:hover { background:rgba(255,255,255,0.08); border-color:var(--border-light); }

  /* ── MODAL ── */
  .overlay {
    position:fixed; top:0; left:0; right:0; bottom:0;
    background:rgba(0,0,0,0.65); display:flex; align-items:center; justify-content:center;
    z-index:1000; backdrop-filter:blur(6px);
  }
  .modal {
    background:#fff; border-radius:16px; padding:28px; min-width:380px; max-width:640px;
    color:#333; box-shadow:0 25px 80px rgba(0,0,0,0.5); animation:scaleIn 0.2s ease-out;
    max-height:85vh; overflow-y:auto; width:95%;
  }
  .modal.fullscreen {
    width:100%; max-width:100%; min-width:100%; height:100vh; max-height:100vh;
    border-radius:0; padding:0; display:flex; flex-direction:column;
  }
  .modal.fullscreen .fullscreen-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 24px; border-bottom:2px solid #e2e8f0;
    background:linear-gradient(135deg,#f8fafc,#eef2f7); flex-shrink:0;
  }
  .modal.fullscreen .fullscreen-header h2 {
    font-size:22px; font-weight:800; color:#0f172a; margin:0; display:flex; align-items:center; gap:10px;
  }
  .modal.fullscreen .fullscreen-header .fs-subtitle {
    font-size:12px; font-weight:400; color:#94a3b8;
  }
  .modal.fullscreen .fullscreen-body {
    flex:1; overflow-y:auto; padding:20px 28px;
  }
  .modal.fullscreen .fullscreen-close {
    width:40px; height:40px; border-radius:10px; border:1px solid #e2e8f0;
    background:#fff; font-size:18px; display:flex; align-items:center;
    justify-content:center; cursor:pointer; color:#64748b; flex-shrink:0;
  }
  .modal.fullscreen .fullscreen-close:hover { background:#f1f5f9; color:#1e293b; }
  .report-2col { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  @media(max-width:900px) { .report-2col { grid-template-columns:1fr; } }
  .modal-title { font-size:20px; font-weight:700; text-align:center; margin-bottom:20px; color:#1a1a1a; }
  .modal-label { font-weight:600; font-size:13px; display:block; margin-bottom:6px; color:#444; }
  .modal-input {
    width:100%; padding:12px; border-radius:10px; border:1px solid #ddd;
    font-size:15px; outline:none; transition:all 0.2s;
  }
  .modal-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
  .modal-btns { display:flex; gap:12px; margin-top:22px; }
  .modal-btn {
    flex:1; padding:13px; border-radius:10px; font-size:14px; font-weight:700; border:none;
  }
  .modal-btn.secondary { background:#f3f4f6; color:#666; border:1px solid #e5e7eb; }
  .modal-btn.secondary:hover { background:#e5e7eb; }
  .modal-btn.primary { background:var(--green); color:#fff; box-shadow:0 4px 12px rgba(34,197,94,0.3); }
  .modal-btn.primary:hover { background:var(--green-dark); }
  .modal-btn.danger { background:var(--red); color:#fff; }
  .modal-btn.danger:hover { background:var(--red-dark); }
  .modal-btn.blue { background:var(--accent); color:#fff; }
  .modal-btn.orange { background:var(--orange); color:#fff; }
  .modal-btn:disabled { opacity:0.5; cursor:not-allowed; }

  .garcom-chips { display:flex; gap:6px; flex-wrap:wrap; }
  .garcom-chip {
    padding:8px 18px; border-radius:20px; font-size:13px; font-weight:600;
    border:2px solid #e5e7eb; background:#f9fafb; color:#666; cursor:pointer;
  }
  .garcom-chip.active { border-color:var(--accent); background:#eff6ff; color:var(--accent); }
  .garcom-chip:hover:not(.active) { border-color:#ccc; }

  .emoji-grid { display:flex; gap:6px; flex-wrap:wrap; }
  .emoji-btn {
    width:44px; height:44px; border-radius:10px; font-size:22px; border:2px solid #e5e7eb;
    background:#f9fafb; display:flex; align-items:center; justify-content:center;
  }
  .emoji-btn.active { border-color:var(--accent); background:#eff6ff; }
  .emoji-btn:hover:not(.active) { border-color:#ccc; }

  .hint-box {
    padding:12px; background:#fffbeb; border-radius:10px; border:1px solid #fde68a;
    font-size:12px; color:#92400e; line-height:1.5;
  }
  .warning-box {
    padding:12px; background:#fff7ed; border-radius:10px; border:1px solid #fed7aa;
    font-size:12px; color:#9a3412; line-height:1.5;
  }
  .preview-box {
    padding:12px; background:#f0fdf4; border-radius:10px; border:1px solid #bbf7d0;
    font-size:13px; display:flex; align-items:center; gap:12px;
  }
  .preview-emoji { font-size:30px; }
  .preview-label { margin-left:auto; font-size:11px; color:#888; }

  .receipt {
    font-family:'JetBrains Mono',monospace; font-size:12px; color:#333;
    background:#fff; padding:20px; border-radius:10px; border:2px dashed #ccc;
  }
  .receipt-header { font-size:16px; font-weight:600; text-align:center; margin-bottom:10px; }
  .receipt-divider { border-bottom:1px dashed #ccc; padding-bottom:8px; margin-bottom:8px; text-align:center; font-size:11px; color:#666; }
  .receipt-line { display:flex; justify-content:space-between; padding:2px 0; }
  .receipt-total { font-weight:700; font-size:15px; margin-top:6px; border-top:1px dashed #ccc; padding-top:8px; }
  .receipt-footer { margin-top:14px; text-align:center; font-size:10px; color:#888; }

  .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .stat-card {
    padding:16px; border-radius:10px; background:#f8fafc; border:1px solid #e2e8f0;
    text-align:center;
  }
  .stat-icon { font-size:26px; }
  .stat-label { font-size:12px; color:#64748b; margin-top:4px; }
  .stat-value { font-size:20px; font-weight:700; color:#0f172a; margin-top:2px; }

  .hist-item {
    display:flex; justify-content:space-between; align-items:center;
    padding:12px; margin-bottom:6px; border-radius:10px; background:#f8fafc; border:1px solid #e2e8f0;
  }
  .hist-id { font-weight:700; font-size:13px; color:#1a1a1a; }
  .hist-meta { font-size:11px; color:#64748b; margin-top:2px; }
  .hist-total { font-weight:700; color:var(--menu-price); font-size:16px; }

  .mesa-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
  .mesa-cell {
    padding:10px 6px; border-radius:10px; text-align:center; cursor:pointer;
    color:#fff; font-size:11px; font-weight:700; border:2px solid transparent;
    transition:all 0.2s;
  }
  .mesa-cell:hover { filter:brightness(1.15); transform:translateY(-2px); }
  .mesa-cell.current { border-color:#fff; box-shadow:0 0 15px rgba(255,255,255,0.2); }
  .mesa-cell.livre { background:#166534; }
  .mesa-cell.ocupada { background:#991b1b; }
  .mesa-cell.reservada { background:#854d0e; }
  .mesa-cell-icon { font-size:18px; }
  .mesa-cell-info { font-size:9px; opacity:0.85; margin-top:2px; }
  .mesa-legend { display:flex; gap:16px; justify-content:center; margin-top:14px; font-size:11px; color:#64748b; }

  .reserva-card { padding:12px; margin-bottom:8px; border-radius:10px; background:#f8fafc; border:1px solid #e2e8f0; }
  .reserva-nome { font-weight:700; font-size:14px; color:#1a1a1a; }
  .reserva-meta { font-size:12px; color:#64748b; margin-top:2px; }

  const geraPixPayload = (valor) => {
    const pad = (id,val) => id + String(val.length).padStart(2,"0") + val;
    const gui = pad("00","br.gov.bcb.pix");
    const chave = pad("01",pixKey);
    const mai = pad("26",gui+chave);
    const mcc = pad("52","0000");
    const moeda = pad("53","986");
    const amount = valor > 0 ? pad("54",valor.toFixed(2)) : "";
    const pais = pad("58","BR");
    const nome = pad("59",pixNome.substring(0,25));
    const cidade = pad("60",pixCidade.substring(0,15));
    const txid = pad("05","***");
    const addData = pad("62",txid);
    const base = pad("00","01") + mai + mcc + moeda + amount + pais + nome + cidade + addData + "6304";
    // CRC16 CCITT
    let crc = 0xFFFF;
    for(let i=0;i<base.length;i++){
      crc ^= base.charCodeAt(i) << 8;
      for(let j=0;j<8;j++) crc = crc & 0x8000 ? (crc<<1)^0x1021 : crc<<1;
      crc &= 0xFFFF;
    }
    return base + crc.toString(16).toUpperCase().padStart(4,"0");
  };

                  return (
                    <div key={s.id} style={{
                      display:"flex",alignItems:"center",gap:14,padding:14,
                      background:"#f8fafc",borderRadius:12,border:"1px solid #e2e8f0",
                    }}>
                      <div style={{
                        width:50,height:50,borderRadius:12,display:"flex",alignItems:"center",
                        justifyContent:"center",fontSize:28,
                        background:s.cargo==="gerente"?"#fffbeb":s.cargo==="cozinha"?"#eff6ff":"#f0fdf4",
                        border:`1px solid ${s.cargo==="gerente"?"#fde68a":s.cargo==="cozinha"?"#bfdbfe":"#bbf7d0"}`,
                      }}>{s.img}</div>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontWeight:700,fontSize:15,color:"#1e293b"}}>{s.nome}</span>
                          <span style={{
                            padding:"2px 8px",borderRadius:10,fontSize:10,fontWeight:600,
                            background:s.cargo==="gerente"?"#fef3c7":s.cargo==="cozinha"?"#dbeafe":"#dcfce7",
                            color:s.cargo==="gerente"?"#92400e":s.cargo==="cozinha"?"#1e40af":"#166534",
                            textTransform:"capitalize",
                          }}>{s.cargo}</span>
                        </div>
                        <div style={{fontSize:11,color:"#64748b",marginTop:2}}>
                          PIN: <strong>{s.pin}</strong>
                          {s.cargo==="garcom"&&<>
                            &nbsp;· 🪑 {mesasAtivas} mesa{mesasAtivas!==1?"s":""}
                            &nbsp;· 💰 {fmt(totalVendido)} vendidos
                            &nbsp;· 📝 {vendasHoje.length} contas
                          </>}
                        </div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        {s.cargo==="gerente" && <span style={{fontSize:10,color:"#f59e0b",fontWeight:600}}>🔑 Acesso Total</span>}
                        {s.cargo==="garcom" && <span style={{fontSize:10,color:"#22c55e",fontWeight:600}}>📋 Pedidos</span>}
                        {s.cargo==="cozinha" && <span style={{fontSize:10,color:"#3b82f6",fontWeight:600}}>🍳 Cozinha</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
              <div style={{marginTop:16,padding:14,background:"#f8fafc",borderRadius:10,border:"1px solid #e2e8f0"}}>
                <div style={{fontSize:13,fontWeight:700,color:"#1e293b",marginBottom:8}}>🔐 Níveis de Acesso:</div>
                <div style={{fontSize:12,color:"#64748b",lineHeight:1.8}}>
                  <strong style={{color:"#92400e"}}>👔 Gerente:</strong> Acesso total — relatórios, fechar contas, pagamentos, configurações, equipe<br/>
                  <strong style={{color:"#166534"}}>🧑‍🍳 Garçom:</strong> Abrir mesas, anotar pedidos, enviar à cozinha, reservas (sem fechar conta ou ver relatórios)<br/>
                  <strong style={{color:"#1e40af"}}>🍳 Cozinha:</strong> Visualizar pedidos recebidos, mesas ativas (sem mexer em pedidos)
                </div>
              </div>
              <div className="modal-btns"><button className="modal-btn secondary" onClick={()=>setModal(null)}>Fechar</button></div>
            </>}

            {modal==="config"&&<>
              <div className="modal-title">⚙️ Configurações</div>
              <div className="config-item" style={{marginBottom:10}}>
                <input type="checkbox" checked={taxaSrv} onChange={()=>setTaxaSrv(!taxaSrv)}/>
                <span style={{fontWeight:700}}>Taxa de Serviço (10%)</span>
              </div>
              <div style={{marginTop:16,marginBottom:8,fontSize:15,fontWeight:700,color:"#1a1a1a"}}>⚡ Dados PIX do Estabelecimento</div>
              <div style={{marginBottom:10}}>
                <label className="modal-label">Chave PIX (CPF, CNPJ, Email ou Celular):</label>
                <input className="modal-input" value={pixKey} onChange={e=>setPixKey(e.target.value)} placeholder="Ex: 12.345.678/0001-90"/>
              </div>
              <div style={{marginBottom:10}}>
                <label className="modal-label">Nome do Estabelecimento:</label>
                <input className="modal-input" value={pixNome} onChange={e=>setPixNome(e.target.value)} placeholder="Ex: Restaurante Sabor"/>
              </div>
              <div style={{marginBottom:10}}>
                <label className="modal-label">Cidade:</label>
                <input className="modal-input" value={pixCidade} onChange={e=>setPixCidade(e.target.value)} placeholder="Ex: São Paulo"/>
              </div>
              {/* Preview QR */}
              <div style={{textAlign:"center",padding:16,background:"#f8fafc",borderRadius:10,border:"1px solid #e2e8f0",marginTop:6}}>
                <div style={{fontSize:12,fontWeight:600,color:"#64748b",marginBottom:8}}>Prévia do QR Code PIX</div>
                {geraQR(geraPixPayload(0))&&(
                  <img src={geraQR(geraPixPayload(0),3)} alt="QR PIX Preview" style={{width:120,height:120,borderRadius:8,border:"2px solid #e2e8f0",padding:4,background:"#fff"}}/>
                )}
                <div style={{fontSize:11,color:"#888",marginTop:6,wordBreak:"break-all"}}>{pixKey}</div>
              </div>
              <div className="modal-btns"><button className="modal-btn secondary" onClick={()=>setModal(null)}>Fechar</button></div>
            </>}

          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
